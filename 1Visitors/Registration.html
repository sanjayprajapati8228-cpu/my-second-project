<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital User Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #dcfbff, #fff1db);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      			font-family: Georgia, serif;

      align-items: center;
      padding: 20px;
    }

    .form-container {
     background: linear-gradient(to right, #f5fdff, #fffbf4);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
    }

    .form-title {
      text-align: center;
      margin-bottom: 25px;
      color: #00796b;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../hms-ui-consistency.css" />
  <link rel="stylesheet" href="../hms-theme.css" />
  <link rel="stylesheet" href="../css/buttons.css">
</head>
<body>

  <div class="form-container">
    <h2 class="form-title">User Registration</h2>
    <form id="registrationForm">
      <div class="mb-3">
        <label for="fullname" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="fullname" required>
      </div>

      <div class="mb-3">
        <label for="dob" class="form-label">Date of Birth</label>
        <input type="date" class="form-control" id="dob" required>
      </div>

      <div class="mb-3">
        <label for="gender" class="form-label">Gender</label>
        <select class="form-select" id="gender" required>
          <option value="">-- Select --</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input class="form-control" type="tel" id="number" name="phone"
                                pattern="[0-9]{10}" maxlength="10" required
                                oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,10);" />
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email">
      </div>

      <div class="mb-3">
        <label for="address" class="form-label">Address</label>
        <input type="text" class="form-control" id="address">
      </div>
<!-- 
      <div class="mb-3">
        <label for="age" class="form-label">Age</label>
        <input type="number" class="form-control" id="age" required>
      </div> -->

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-control" required>
      </div>

      <div id="error" class="text-danger mb-3" style="display: none;"></div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary-action">Register</button>
      </div>
    </form>
  </div>

  <!-- Bootstrap JS CDN (with Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JavaScript for password validation -->
  <script>
   document.getElementById("registrationForm").addEventListener("submit", function(event) {
  event.preventDefault(); // Always prevent default form behavior

  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const fullName = document.getElementById("fullname").value;
  const errorDiv = document.getElementById("error");

  if (password !== confirmPassword) {
    alert("Passwords do not match!");
    errorDiv.style.display = "block";
  } else {
    errorDiv.style.display = "none";
    // alert("Registration Successful for " + fullName + "!");
    window.location.href = "../2User/Dashboard.html"; // adjust this path
  }
});

  </script>
   <script>
        const phoneInput = document.getElementById('number');
        phoneInput.addEventListener('input', function () {
            if (this.value.length > 10) {
                alert("Phone number cannot exceed 10 digits!");
                this.value = this.value.slice(0, 10);
            }
        });

    </script>
</body>
</html>
